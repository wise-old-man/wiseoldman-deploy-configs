global:
  scrape_timeout: 10s

scrape_configs:
  - job_name: metrics-scrape
    metrics_path: /scrape
    scrape_interval: 30s
    static_configs:
      - targets: ["metrics:3500"]

  - job_name: "cadvisor-core"
    scrape_interval: 30s
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "node-exporter-core"
    scrape_interval: 30s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: 'cadvisor-worker'
    static_configs:
      - targets: ['<INSERT_WORKER_PRIVATE_IP>:8080']

  - job_name: 'node-exporter-worker'
    static_configs:
      - targets: ['<INSERT_WORKER_PRIVATE_IP>:9100']

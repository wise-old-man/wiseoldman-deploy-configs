global:
  scrape_timeout: 10s

scrape_configs:
  - job_name: api-scrape
    metrics_path: /metrics
    scrape_interval: 30s
    params:
      source: ["api"]
    static_configs:
      - targets: ["metrics:3500"]
        labels:
          thread_index: "0"
      - targets: ["metrics:3500"]
        labels:
          thread_index: "1"
    relabel_configs:
      - source_labels: [thread_index]
        target_label: __param_thread_index

  - job_name: job-runner-scrape
    metrics_path: /metrics
    scrape_interval: 30s
    params:
      source: ["job-runner"]
    static_configs:
      - targets: ["metrics:3500"]
        labels:
          thread_index: "0"
      - targets: ["metrics:3500"]
        labels:
          thread_index: "1"
    relabel_configs:
      - source_labels: [thread_index]
        target_label: __param_thread_index

  - job_name: discord-bot-scrape
    metrics_path: /metrics
    params:
      source: ["discord-bot"]
    scrape_interval: 30s
    static_configs:
      - targets: ["metrics:3500"]

  - job_name: "cadvisor-core"
    scrape_interval: 30s
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "node-exporter-core"
    scrape_interval: 30s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: 'cadvisor-worker'
    static_configs:
      - targets: ['<INSERT_WORKER_PRIVATE_IP>:8080']

  - job_name: 'node-exporter-worker'
    static_configs:
      - targets: ['<INSERT_WORKER_PRIVATE_IP>:9100']
